name: 打包 Windows 版本

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: >
          pyinstaller --onefile --name SSS
          --add-data "templates;templates"
          --add-data "static;static"
          --add-data "fund_tracker.db;."
          --hidden-import flask_sqlalchemy
          --hidden-import sqlalchemy.sql.default_comparator
          --hidden-import sqlalchemy.ext.declarative
          --hidden-import chinese_calendar
          --hidden-import chinese_calendar.constants
          --hidden-import calculator
          --hidden-import models
          --hidden-import trading_calendar
          --exclude-module tkinter
          --exclude-module matplotlib
          --exclude-module numpy
          --exclude-module pandas
          --console
          app.py
      - uses: actions/upload-artifact@v4
        with:
          name: SSS
          path: dist/SSS.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4

      - name: 发布 Release
        run: |
          API="https://api.github.com/repos/${{ github.repository }}"
          AUTH="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"

          # 删除已有 latest release
          EXISTING=$(curl -s -H "$AUTH" "$API/releases/tags/latest")
          EXISTING_ID=$(echo "$EXISTING" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
          if [ -n "$EXISTING_ID" ]; then
            echo "删除旧 release id=$EXISTING_ID"
            curl -s -X DELETE -H "$AUTH" "$API/releases/$EXISTING_ID"
            sleep 2
          fi

          # 删除旧 tag
          curl -s -X DELETE -H "$AUTH" "$API/git/refs/tags/latest" 2>/dev/null || true

          # 创建新 release
          curl -s -X POST -H "$AUTH" -H "Content-Type: application/json" \
            "$API/releases" -d '{
              "tag_name": "latest",
              "name": "SSS五绝计算器",
              "body": "双击 SSS.exe 即可使用，无需安装 Python 或任何环境。",
              "make_latest": "true"
            }' > release.json

          UPLOAD_URL=$(python3 -c "import json,sys; print(json.load(sys.stdin)['upload_url'].split('{')[0])" < release.json)

          curl -s -X POST -H "$AUTH" -H "Content-Type: application/octet-stream" \
            "$UPLOAD_URL?name=SSS.exe" --data-binary @SSS/SSS.exe

          echo "发布完成"
