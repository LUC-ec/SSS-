name: 打包 Windows 版本

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 打包 EXE
        run: |
          pyinstaller --onefile --name SSS五绝计算器 `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "fund_tracker.db;." `
            --hidden-import flask_sqlalchemy `
            --hidden-import sqlalchemy.sql.default_comparator `
            --hidden-import sqlalchemy.ext.declarative `
            --hidden-import chinese_calendar `
            --hidden-import chinese_calendar.constants `
            --hidden-import calculator `
            --hidden-import models `
            --hidden-import trading_calendar `
            --exclude-module tkinter `
            --exclude-module matplotlib `
            --exclude-module numpy `
            --exclude-module pandas `
            --console `
            app.py

      - name: 发布到 GitHub Release
        run: |
          # 删除旧 release 和 tag
          gh release delete latest --yes --cleanup-tag 2>$null
          # 等 GitHub 清理完
          Start-Sleep -Seconds 5
          # 重命名 exe 为纯英文避免编码问题
          Move-Item -Path "dist/SSS五绝计算器.exe" -Destination "dist/SSS.exe" -Force
          # 创建新 release
          gh release create latest "dist/SSS.exe" `
            --title "SSS五绝计算器 - Windows" `
            --notes "双击 SSS.exe 即可使用，无需安装任何环境。" `
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
