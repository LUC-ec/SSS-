name: 打包 Windows / macOS 版本

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: >
          pyinstaller --onefile --name SSS
          --add-data "templates;templates"
          --add-data "static;static"
          --add-data "fund_tracker.db;."
          --hidden-import flask_sqlalchemy
          --hidden-import sqlalchemy.sql.default_comparator
          --hidden-import sqlalchemy.ext.declarative
          --hidden-import chinese_calendar
          --hidden-import chinese_calendar.constants
          --hidden-import calculator
          --hidden-import models
          --hidden-import trading_calendar
          --exclude-module tkinter
          --exclude-module matplotlib
          --exclude-module numpy
          --exclude-module pandas
          --console
          app.py
      - uses: actions/upload-artifact@v4
        with:
          name: SSS-Windows
          path: dist/SSS.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: >
          pyinstaller --onefile --name SSS
          --add-data "templates:templates"
          --add-data "static:static"
          --add-data "fund_tracker.db:."
          --hidden-import flask_sqlalchemy
          --hidden-import sqlalchemy.sql.default_comparator
          --hidden-import sqlalchemy.ext.declarative
          --hidden-import chinese_calendar
          --hidden-import chinese_calendar.constants
          --hidden-import calculator
          --hidden-import models
          --hidden-import trading_calendar
          --exclude-module tkinter
          --exclude-module matplotlib
          --exclude-module numpy
          --exclude-module pandas
          --console
          app.py
      - uses: actions/upload-artifact@v4
        with:
          name: SSS-macOS
          path: dist/SSS

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
      - name: 清理旧 Release
        shell: bash
        run: |
          set +e
          gh release delete latest --yes --cleanup-tag 2>/dev/null
          exit 0

      - name: 创建 Release
        run: |
          gh release create latest SSS-Windows/SSS.exe SSS-macOS/SSS \
            --title "SSS五绝计算器" \
            --notes "Windows 用户下载 SSS.exe 双击运行。macOS 用户下载 SSS 双击运行。无需安装 Python。" \
            --latest
